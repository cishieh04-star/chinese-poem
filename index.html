<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中國詩詞互動遊戲</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; padding: 20px; max-width: 600px; 
            margin: auto; background-color: #fdf6e3; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .box {
            padding: 15px; margin: 10px 0; border-radius: 15px;
            font-weight: bold; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 層級一：最大標題 */
        .header-box { background: #5d4037; color: #ffffff; font-size: 2rem; padding: 20px; }
        
        /* 層級二：次標題/說明 */
        .category-box { background: #ffe4b5; color: #5d4037; font-size: 1.1rem; width: fit-content; margin: 10px auto; padding: 8px 20px; border-radius: 20px; }
        
        /* 層級三：遊戲按鈕 (調整字體與大小) */
        ul { 
            list-style-type: none; padding: 0; margin: 20px 0 0 0; 
            flex-grow: 1; display: flex; flex-direction: column; 
        }
        li { flex-grow: 1; display: flex; margin-bottom: 15px; }
        
        .game-link { 
            background: #2e7d32; color: #ffffff; font-size: 1.4rem; 
            cursor: pointer; width: 100%; min-height: 70px;
        }
        a { text-decoration: none; color: inherit; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="box header-box">詩詞互動遊戲</div>
    <div class="category-box">請選擇下列詩詞遊戲單元</div>

    <ul id="game-list"></ul>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const games = [
                { name: "從軍行", file: "join-army.html" },
                { name: "秋夕", file: "autumn-night.html" },
            ];

            const listElement = document.getElementById('game-list');
            
            games.forEach(game => {
                const li = document.createElement('li');
                li.innerHTML = '<div class="box game-link"><a href="' + game.file + '">' + game.name + '</a></div>';
                listElement.appendChild(li);
            });
        });
    </script>
</body>
</html>
